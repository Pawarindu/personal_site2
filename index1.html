<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details</title>
    <link rel="icon" href="img/favicon.png">
    <style>
        /* Background setup */
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("img/318-1920x1080-blur_10.jpg") no-repeat center center/cover;
            animation: fadeIn 1.5s ease-in-out;
        }
        /* Fade-in animation for body */
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        /* Blur glass box */
        
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            width: 400px;
            animation: slideUp 1.2s ease-out;
        }
        /* Container appear animation */
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        /* Profile image */
        
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        /* Floating animation for profile pic */
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        h2 {
            color: #fff;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-in-out;
        }
        
        .buttons {
            position: relative;
            height: 200px;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s, background 0.3s;
            position: absolute;
        }
        
        button:hover {
            transform: scale(1.1);
        }
        
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            left: 80px;
            top: 60px;
        }
        
        #noBtn {
            background-color: #f44336;
            color: white;
            right: 80px;
            top: 60px;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 🔹 Your image here -->
        <img src="img/12.jpg" alt="Profile" class="profile-pic">

        <h2 style="color:rgb(153, 0, 0)">ඔබට මගේ අභ්‍යන්තර තොරතුරු වෙත ප්‍රවේශ වීමට අවශ්‍යද?</h2>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const buttonsDiv = document.querySelector('.buttons');

        function moveYesButton() {
            let x, y;
            const padding = 50; // keep a safe distance

            do {
                x = Math.floor(Math.random() * (buttonsDiv.clientWidth - yesBtn.clientWidth));
                y = Math.floor(Math.random() * (buttonsDiv.clientHeight - yesBtn.clientHeight));
            } while (
                Math.abs(x - yesBtn.offsetLeft) < padding &&
                Math.abs(y - yesBtn.offsetTop) < padding
            );

            yesBtn.style.left = x + "px";
            yesBtn.style.top = y + "px";
        }

        // Run away on hover
        yesBtn.addEventListener('mouseover', moveYesButton);

        // Run away even if clicked
        yesBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveYesButton();
        });

        // No button එකට click event එකක් දාමු
        document.getElementById("noBtn").addEventListener("click", function() {
            // ඕන file එකට redirect වෙන්න
            window.location.href = "index.html"; // මෙතන ඔයාගේ html file එකේ නම දාන්න
        });



        // No button action //document.getElementById('noBtn').addEventListener('click', () => { //alert("Access Denied!"); //});
    </script>

</body>

</html>
