// Add as many arts as you like
const asciiList = [asciiArt1, asciiArt2, asciiArt3, asciiArt4, asciiArt5];

// mouse (PC)
window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY + window.scrollY;
});

// touch (mobile)
window.addEventListener("touchmove", (e) => {
    let touch = e.touches[0];
    mouse.x = touch.clientX;
    mouse.y = touch.clientY + window.scrollY;
});

window.addEventListener("mouseleave", () => {
    mouse.x = null;
    mouse.y = null;
});

class Particle {
    constructor(x, y, char) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.char = char;
        this.size = 13;
    }

    draw() {
        ctx.fillStyle = "#00ff99";
        ctx.font = this.size + "px monospace";
        ctx.fillText(this.char, this.x, this.y);
    }

    update() {
        if (mouse.x === null) {
            this.x += (this.baseX - this.x) * 0.08;
            this.y += (this.baseY - this.y) * 0.08;
            return;
        }

        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < mouse.radius) {
            let force = (mouse.radius - distance) / mouse.radius;
            this.x -= (dx / (distance || 1)) * force * 8;
            this.y -= (dy / (distance || 1)) * force * 8;
        } else {
            this.x += (this.baseX - this.x) * 0.08;
            this.y += (this.baseY - this.y) * 0.08;
        }
    }
}

function init() {
    particles = [];

    let charWidth = 10;
    let charHeight = 16;
    let gap = 150; // distance between arts

    let currentY = 100;

    asciiList.forEach(ascii => {

        let textWidth = ascii[0].length * charWidth;
        let startX = (canvas.width - textWidth) / 2;

        for (let y = 0; y < ascii.length; y++) {
            for (let x = 0; x < ascii[y].length; x++) {

                let char = ascii[y][x];

                if (char !== " ") {
                    particles.push(
                        new Particle(
                            startX + x * charWidth,
                            currentY + y * charHeight,
                            char
                        )
                    );
                }
            }
        }

        currentY += ascii.length * charHeight + gap;
    });

    canvas.height = currentY + 100;
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
    resizeCanvas();
    init();
});

</script>
